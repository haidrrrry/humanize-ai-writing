<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Humanize AI Writing logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="ink" x1="120" y1="180" x2="400" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E9E3FF"/>
    </linearGradient>
  </defs>

  <!-- badge -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="115.5" fill="none" stroke="#ffffff" stroke-opacity="0.18"/>

  <!-- speech bubble -->
  <path d="M150 132 H362 a44 44 0 0 1 44 44 V300 a44 44 0 0 1 -44 44 H236 l-58 52 v-52 H150 a44 44 0 0 1 -44 -44 V176 a44 44 0 0 1 44 -44 Z"
        fill="#ffffff" fill-opacity="0.10" stroke="#ffffff" stroke-opacity="0.55" stroke-width="6"/>

  <!-- robotic lines (left, dashed/blocky) morph to human wave (bottom) -->
  <g stroke="url(#ink)" stroke-width="16" stroke-linecap="round">
    <line x1="150" y1="186" x2="300" y2="186" stroke-dasharray="22 14" stroke-opacity="0.7"/>
    <line x1="150" y1="228" x2="340" y2="228" stroke-dasharray="30 12" stroke-opacity="0.85"/>
    <!-- the humanized line: smooth handwritten squiggle -->
    <path d="M150 276 C 196 250, 226 304, 270 276 S 330 250, 366 276" fill="none" stroke-opacity="1"/>
  </g>

  <!-- pen nib turning the line human -->
  <g transform="translate(354 250) rotate(38)">
    <path d="M0 0 L26 0 L40 30 L13 44 Z" fill="#ffffff"/>
    <path d="M13 12 L27 12 L33 30 L18 36 Z" fill="#4F46E5"/>
    <circle cx="20" cy="40" r="4.5" fill="#ffffff"/>
  </g>

  <!-- spark -->
  <path d="M392 150 l8 20 20 8 -20 8 -8 20 -8 -20 -20 -8 20 -8 Z" fill="#ffffff" fill-opacity="0.92"/>
</svg>
